<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Workout</title>
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body>
    <header class="header">
      <h1 class="title">Workout Diary</h1>
      <p class="subtitle">Мій щоденник тренувань</p>
    </header>

    <main class="container">
      <section class="card">
        <h2 class="card__title">Нове тренування</h2>

        <form class="form" id="workout-create-form" autocomplete="off">
          <label class="field">
            <span class="field__label">Дата</span>
            <input class="field__input" type="date" name="date" required />
          </label>

          <label class="field">
            <span class="field__label">Що качаємо, машина?</span>
            <input
              class="field__input"
              type="text"
              name="title"
              placeholder="Напр. Ноги"
              required
            />
          </label>

          <button class="btn" type="submit">Створити тренування</button>
        </form>

        <hr class="divider" />

        <h2 class="card__title">Додати вправу</h2>

        <form class="form" id="exercise-form" autocomplete="off">
          <p class="hint" id="active-workout-hint">Активне тренування: немає</p>

          <label class="field">
            <span class="field__label">Вправа</span>
            <input
              class="field__input"
              type="text"
              name="exercise"
              placeholder="Напр. Присід"
              required
            />
          </label>
        

        <div class="row">
          <label class="field">
            <span class="field__label">Вага (кг)</span>
            <input
              class="field__input"
              type="number"
              name="weight"
              min="0"
              step="0.5"
              placeholder="Напр. 60"
              required
            />
          </label>

          <label class="field">
            <span class="field__label">Повтори</span>
            <input
              class="field__input"
              type="number"
              name="reps"
              min="1"
              step="1"
              placeholder="Напр. 10"
              required
            />
          </label>
        </div>

        <button class="btn" type="submit">Додати вправу</button>
      </section>
      </form>

      <section class="card">
        <h2 class="card__title">Тренування</h2>

        <div id="workouts">
          <p class="empty">Поки що немає записів. Додай перший сет 👆</p>
        </div>
      </section>
    </main>

    <script src="./js/app.js" defer></script>
  </body>
</html>
